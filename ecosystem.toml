[[apps]]
name = "vibe-kanban"
script = "bunx"
args = ["vibe-kanban@https://github.com/BloopAI/vibe-kanban/releases/download/v0.1.40-20260401153532/vibe-kanban-0.1.40.tgz"]
autorestart = true
max_restarts = 10

[apps.health_check]
check_type = "http"
url = "http://localhost:4040"
interval = 30
timeout = 5
retries = 3

[apps.env]
VK_SHARED_API_BASE = "https://server-vibe.hariom.cc"
VK_SHARED_RELAY_API_BASE = "https://relay-vibe.hariom.cc"
PORT = "4040"
HOST = "0.0.0.0"

[[apps]]
name = "autopilot"
script = "bun"
args = ["run", "src/index.ts"]
autorestart = true
max_restarts = 10
restart_delay = "5s"

[apps.env]
AUTOPILOT_CONFIG = "./autopilot.config.json"