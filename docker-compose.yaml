services:
  remote-db:
    image: postgres:17-alpine
    container_name: vk-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: remote
      POSTGRES_USER: remote
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - remote-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote -d remote"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  electric:
    image: electricsql/electric:latest
    container_name: vk-electric
    working_dir: /app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://electric_sync:${ELECTRIC_ROLE_PASSWORD}@remote-db:5432/remote?sslmode=disable
      PG_PROXY_PORT: 65432
      LOGICAL_PUBLISHER_HOST: electric
      AUTH_MODE: insecure
      ELECTRIC_INSECURE: true
      ELECTRIC_MANUAL_TABLE_PUBLISHING: true
      ELECTRIC_USAGE_REPORTING: false
      ELECTRIC_FEATURE_FLAGS: allow_subqueries,tagged_subqueries
    volumes:
      - electric-data:/app/persistent
    depends_on:
      remote-db:
        condition: service_healthy
      remote-server:
        condition: service_healthy

  remote-server:
    image: ghcr.io/harryy2510/vibe-kanban/remote:latest
    container_name: vk-server
    restart: unless-stopped
    env_file: .env
    depends_on:
      remote-db:
        condition: service_healthy
    environment:
      RUST_LOG: info,remote=info
      SERVER_DATABASE_URL: postgres://remote:${DB_PASSWORD}@remote-db:5432/remote
      SERVER_LISTEN_ADDR: 0.0.0.0:8081
      ELECTRIC_URL: http://electric:3000
      SERVER_PUBLIC_BASE_URL: https://${SERVER_DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  relay-server:
    image: ghcr.io/harryy2510/vibe-kanban/relay:latest
    container_name: vk-relay
    restart: unless-stopped
    env_file: .env
    depends_on:
      remote-db:
        condition: service_healthy
    environment:
      RUST_LOG: info
      SERVER_DATABASE_URL: postgres://remote:${DB_PASSWORD}@remote-db:5432/remote
      RELAY_LISTEN_ADDR: 0.0.0.0:8082
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: vk-azurite
    restart: unless-stopped
    command: >
      azurite-blob
      --blobHost 0.0.0.0
      --blobPort 10000
      --location /data
      --loose
      --skipApiVersionCheck
      --disableProductStyleUrl
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  azurite-init:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: vk-azurite-init
    depends_on:
      azurite:
        condition: service_healthy
    restart: "no"
    entrypoint: node
    command:
      - -e
      - |
        const http=require('http'),crypto=require('crypto');
        const a='devstoreaccount1',k='Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==';
        function req(method,path,body){return new Promise((ok)=>{const t=new Date().toUTCString(),l=body?Buffer.byteLength(body):0,ct=body?'application/xml':'';const fp='/'+a+path,parts=fp.split('?'),up=parts[0],qp=new URLSearchParams(parts[1]||'');let csh='';[...qp].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([k,v])=>csh+='\n'+k+':'+v);const s=method+'\n\n\n'+(l||'')+'\n\n'+ct+'\n\n\n\n\n\n\nx-ms-date:'+t+'\nx-ms-version:2020-10-02\n/'+a+up+csh;const sig=crypto.createHmac('sha256',Buffer.from(k,'base64')).update(s,'utf8').digest('base64');const h={'x-ms-version':'2020-10-02','x-ms-date':t,'Authorization':'SharedKey '+a+':'+sig};if(ct)h['Content-Type']=ct;if(l)h['Content-Length']=l;const r=http.request({hostname:'vk-azurite',port:10000,path:fp,method,headers:h},res=>{let b='';res.on('data',c=>b+=c);res.on('end',()=>{console.log(method,path,res.statusCode);ok(res.statusCode)})});if(body)r.write(body);r.end()})};
        (async()=>{await req('PUT','?restype=service&comp=properties','<?xml version="1.0" encoding="utf-8"?><StorageServiceProperties><Cors><CorsRule><AllowedOrigins>https://vibe.hariom.cc</AllowedOrigins><AllowedMethods>GET,PUT,HEAD,OPTIONS</AllowedMethods><AllowedHeaders>*</AllowedHeaders><ExposedHeaders>*</ExposedHeaders><MaxAgeInSeconds>86400</MaxAgeInSeconds></CorsRule></Cors></StorageServiceProperties>');await req('PUT','/issue-attachments?restype=container',null)})();

volumes:
  remote-db-data:
  electric-data:
  azurite-data: